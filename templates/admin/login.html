<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — SinSaúdeSP</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="admin-login-page">
  <div class="admin-login-card">
    <div class="logo" style="justify-content: center;">
      <img src="/static/img/logo.png" alt="SinSaúdeSP" class="logo-img" style="height: 64px;">
    </div>

    <h1>Painel Administrativo</h1>

    {% if erro %}
    <div class="alert-error">{{ erro }}</div>
    {% endif %}

    <form method="POST" action="/admin/login">
      <div class="field-group" style="text-align: left;">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required autofocus autocomplete="username"
               placeholder="admin@sinsaudesp.org.br">
      </div>
      <div class="field-group" style="text-align: left; margin-bottom: 24px;">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required autocomplete="current-password"
               placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit-main" style="opacity: 1;">Entrar</button>
    </form>
  </div>
</div>

</body>
</html>
